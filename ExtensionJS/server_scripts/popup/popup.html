<div class="login-container">
    <!-- LOADING SCREEN -->
    <div id="loadingScreen" style="display: flex;">
        <div class="loading-content-wrapper">
            <div class="loading-spinner"></div>
            <h2 class="loading-title" id="loadingTitle">Bağlanıyor...</h2>
            <p class="loading-subtitle" id="loadingSubtitle">Uzun sürerse iletişime geçiniz</p>
        </div>
    </div>

    <div class="logo-section" id="logoSection">
        <div class="logo">
            <img src="assets/image/app_logo.png" alt="SBC Monster Logo">
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" style="display: none;">
        <div class="login-content-wrapper">
            <button type="button" class="google-login-btn" id="googleLoginBtn">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span id="googleBtnText">Google ile Giriş Yap</span>
            </button>
            <p class="footer-text" id="footerLoginText">🔒 Verileriniz şifreli ve güvenli</p>
        </div>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profileScreen" style="display: none;">
        <div class="profile-wrapper">
            <!-- Profile Header Card -->
            <div class="profile-card">
                <div class="card-header">
                    <div class="avatar-container">
                        <svg class="google-logo-avatar" id="userAvatar" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                        </svg>
                    </div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Kullanıcı</div>
                        <div class="user-email" id="userEmail">E-posta bilinmiyor</div>
                        <div class="user-email-warn" id="userId"></div>
                    </div>
                </div>

                <!-- Subscription Card Highlight -->
                <div class="subscription-status-button" id="subscriptionStatusBtn" style="display: none;">
                    <img src="" alt="Plan" class="subscription-card-img" id="subscriptionImage">
                    <div class="subscription-status-text">
                        <span class="subscription-status-type" id="subscriptionType">Trial</span>
                        <span class="subscription-status-days" id="subscriptionDays">30 gün kaldı</span>
                    </div>
                </div>

                <!-- Card Content -->
                <div class="card-content">
                    <div class="info-section" id="infoSection">
                        <!-- Info items populated by JS -->
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="card-actions">
                    <button type="button" class="buy-subscription-btn" id="buySubBtn" style="display: none;">
                        <i class="fas fa-crown" style="color: #fbbf24;"></i>
                        <span id="buySubBtnText">Abonelik Satın Al</span>
                    </button>
                    <button type="button" class="logout-button" id="logoutBtn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 13l4-4m0 0l-4-4m4 4H9"/>
                        </svg>
                        <span id="logoutBtnText">Oturumu Kapat</span>
                    </button>
                </div>
            </div>

            <div class="footer-text"><span id="footerProfileText">🇹🇷 sbcmonster.com'a Hoşgeldiniz</span></div>
        </div>
    </div>
</div>
