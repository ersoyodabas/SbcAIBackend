<div id="modal-log" class="modal modal-app" tabindex="-1">
    <div class="modal-dialog modal-auto" style="float: right;right: 1%;max-width: 650px;">
        <div class="modal-content">
            <div class="modal-header">
                <button class="btn btn-sm btn-danger btn-rounded" id="btnLogClear"> <i class="fa-solid fa-trash"></i> </button>
                <h5 id="toast-header" class="modal-title text-uppercase">
                    LOGS
                </h5>
                <button type="button" class="btn-close dismiss" data-bs-dismiss="modal" aria-label="Close">
                    <i class="fa-sharp fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body scroll-log">
                <table id="tbl-log-content">
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
