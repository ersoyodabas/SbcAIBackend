<div id="modal-confirm" class="modal modal-app">
    <div class="modal-content">
        <div class="header">
            <span class="close" style="font-size: 30px !important;">&times;</span>
            <span id="spanConfirmTitle"></span>
        </div>
        <div class="body" style="padding: 30px 0px 20px 0px !IMPORTANT;text-align: center !important;    text-align: center !important;
    font-size: 16px;
    font-weight: bold;">
            <span id="spanConfirmQuestion"></span>
        </div>
        <div class="footer" style="text-align:center !important">
            <button id="btnConfirmNo" class="menuButton" style="background-color:#4f4f4f  !important;width:120px;   display: inline-block;">
                <i class="fas fa-times-circle"></i>
                <span id="span-no" style="margin-left:20px;margin-right:20px">  </span>
            </button>
            <button id="btnConfirmYes" class="menuButton" style="margin-left:20px;background-color:#2cab48  !important;width:120px;   display: inline-block;">
                <i class="fas fa-check-circle"></i>
                <span id="span-yes" style="margin-left:20px;margin-right:20px">  </span>
            </button>
        </div>
    </div>
</div>
